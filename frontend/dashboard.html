<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Customer Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

    <h1>GainOne AI Customer Support</h1>

    <h2>Customer Dashboard</h2>

    <div class="cards">

        <div class="card">

            <h3>Total Chats</h3>

            <h1 id="totalChats">0</h1>

        </div>

        <div class="card">

            <h3>Total Tickets</h3>

            <h1 id="totalTickets">0</h1>

        </div>

    </div>

    <div class="buttons">

        <button onclick="window.location='chat.html'">

            AI Chat

        </button>

        <button onclick="window.location='tickets.html'">

            My Tickets

        </button>

        <button onclick="window.location='profile.html'">

            Profile

        </button>

        <button onclick="logout()">

            Logout

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
