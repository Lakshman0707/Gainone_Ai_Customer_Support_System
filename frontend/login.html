<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GainOne Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-container">

    <h1>GainOne AI Customer Support</h1>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Enter Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p>

        Don't have an account?

        <a href="register.html">

            Register

        </a>

    </p>

</div>

<script src="script.js"></script>

</body>
</html>
